<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sasa's Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    /* ===== VARIABLES ===== */
    :root {
      --bg: #FAF6F1;
      --bg-alt: #F0E8DD;
      --fg: #2C1810;
      --fg2: #6B5344;
      --muted: #9C8B7D;
      --accent: #C87941;
      --accent-h: #A85E2A;
      --accent-l: #FDF0E3;
      --card: #FFF;
      --border: #E8DDD0;
      --ok: #4A9D5B;
      --err: #D94040;
      --warn: #E6A020;
      --sh: 0 2px 16px rgba(44, 24, 16, .07);
      --sh-h: 0 8px 32px rgba(44, 24, 16, .14);
      --r: 16px;
      --rs: 10px;
      --rr: 8px;
      --font: 'Cairo', sans-serif;
      --font-d: 'Playfair Display', serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      scroll-behavior: smooth;
      -webkit-tap-highlight-color: transparent
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      overflow-x: hidden;
      min-height: 100vh
    }

    img {
      display: block;
      max-width: 100%
    }

    button {
      cursor: pointer;
      font-family: var(--font);
      border: none;
      background: none
    }

    input,
    textarea,
    select {
      font-family: var(--font);
      border: 1.5px solid var(--border);
      border-radius: var(--rr);
      padding: 10px 14px;
      background: var(--card);
      color: var(--fg);
      width: 100%;
      transition: border .2s
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: var(--accent)
    }

    textarea {
      resize: vertical;
      min-height: 70px
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px
    }

    /* ===== LOADING ===== */
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity .5s
    }

    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none
    }

    .loader {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    #loading-screen .brand-load {
      font-family: var(--font-d);
      font-size: 2rem;
      color: var(--accent);
      letter-spacing: 1px
    }

    /* ===== SYNC INDICATOR ===== */
    .sync-indicator {
      position: fixed;
      bottom: 16px;
      left: 16px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: .75rem;
      background: var(--card);
      box-shadow: var(--sh);
      border: 1px solid var(--border);
      transition: all .3s
    }

    .sync-indicator .sync-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--ok);
      flex-shrink: 0
    }

    .sync-indicator.syncing .sync-dot {
      background: var(--warn);
      animation: pulse 1s infinite
    }

    .sync-indicator.error .sync-dot {
      background: var(--err)
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    .sync-indicator span:first-child {
      color: var(--fg2)
    }

    .sync-indicator span:last-child {
      color: var(--muted);
      font-size: .65rem
    }

    .lang-en .sync-indicator {
      left: 16px;
      right: auto
    }

    /* ===== HEADER ===== */
    #mainHeader {
      position: sticky;
      top: 0;
      z-index: 500;
      background: rgba(250, 246, 241, .85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      transition: box-shadow .3s
    }

    #mainHeader.scrolled {
      box-shadow: var(--sh)
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .brand-logo {
      width: 42px;
      height: 42px;
      background: var(--accent);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 1.3rem;
      font-weight: 900;
      font-family: var(--font-d)
    }

    .brand-name {
      font-family: var(--font-d);
      font-size: 1.5rem;
      color: var(--accent);
      line-height: 1
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 6px
    }

    .hdr-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: var(--fg2);
      transition: all .2s
    }

    .hdr-btn:hover {
      background: var(--accent-l);
      color: var(--accent)
    }

    .lang-btn {
      font-size: .8rem;
      font-weight: 700;
      width: auto;
      padding: 0 14px;
      border-radius: 10px;
      letter-spacing: .5px
    }

    .lang-btn.active {
      background: var(--accent);
      color: #fff
    }

    /* ===== BESTSELLERS ===== */
    .bs-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px 20px 10px
    }

    .bs-section h2 {
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .bs-section h2 i {
      color: var(--accent);
      font-size: 1.3rem
    }

    .bs-scroll {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      padding-bottom: 12px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch
    }

    .bs-scroll::-webkit-scrollbar {
      height: 4px
    }

    .bs-card {
      flex: 0 0 160px;
      scroll-snap-align: start;
      background: var(--card);
      border-radius: var(--r);
      overflow: hidden;
      box-shadow: var(--sh);
      cursor: pointer;
      transition: transform .3s, box-shadow .3s
    }

    .bs-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--sh-h)
    }

    .bs-img-wrap {
      position: relative;
      aspect-ratio: 1/1;
      overflow: hidden
    }

    .bs-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .4s
    }

    .bs-card:hover .bs-img-wrap img {
      transform: scale(1.08)
    }

    .bs-star {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(201, 121, 65, .9);
      color: #fff;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .75rem
    }

    .lang-en .bs-star {
      right: auto;
      left: 8px
    }

    .bs-info {
      padding: 10px 12px 14px
    }

    .bs-name {
      font-size: .85rem;
      font-weight: 700;
      line-height: 1.3
    }

    .bs-price {
      font-size: .95rem;
      font-weight: 800;
      color: var(--accent);
      margin-top: 4px
    }

    .bs-price span {
      font-size: .7rem;
      font-weight: 400;
      color: var(--muted)
    }

    /* ===== CATEGORY TABS ===== */
    .cat-tabs-wrap {
      position: sticky;
      top: 65px;
      z-index: 400;
      background: rgba(250, 246, 241, .9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border)
    }

    .cat-tabs {
      max-width: 1200px;
      margin: 0 auto;
      padding: 10px 20px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch
    }

    .cat-tabs::-webkit-scrollbar {
      height: 0
    }

    .cat-tab {
      flex: 0 0 auto;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: .82rem;
      font-weight: 600;
      color: var(--fg2);
      background: var(--card);
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      transition: all .25s;
      scroll-snap-align: start
    }

    .cat-tab i {
      font-size: 1rem
    }

    .cat-tab:hover {
      border-color: var(--accent);
      color: var(--accent)
    }

    .cat-tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      box-shadow: 0 4px 14px rgba(200, 121, 65, .3)
    }

    .cat-tab .cat-count {
      background: rgba(255, 255, 255, .25);
      padding: 1px 7px;
      border-radius: 10px;
      font-size: .7rem;
      font-weight: 700
    }

    .cat-tab:not(.active) .cat-count {
      background: var(--bg-alt);
      color: var(--muted)
    }

    /* ===== MENU SECTIONS ===== */
    .menu-sections {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 20px 60px
    }

    .menu-section {
      display: none;
      animation: fadeUp .4s ease
    }

    .menu-section.active {
      display: block
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .section-header {
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 2px solid var(--border)
    }

    .section-header h2 {
      font-size: 1.5rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 10px
    }

    .section-header h2 i {
      color: var(--accent);
      font-size: 1.4rem
    }

    .section-header p {
      color: var(--fg2);
      font-size: .88rem;
      margin-top: 6px;
      max-width: 600px
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px
    }

    /* ===== MENU CARD ===== */
    .menu-card {
      background: var(--card);
      border-radius: var(--r);
      overflow: hidden;
      box-shadow: var(--sh);
      transition: transform .3s, box-shadow .3s;
      position: relative
    }

    .menu-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--sh-h)
    }

    .card-img {
      aspect-ratio: 4/3;
      overflow: hidden;
      position: relative
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .5s
    }

    .menu-card:hover .card-img img {
      transform: scale(1.06)
    }

    .card-tags {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 5px;
      flex-wrap: wrap
    }

    .lang-en .card-tags {
      right: auto;
      left: 10px
    }

    .tag {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: .65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .3px
    }

    .tag-veg {
      background: rgba(74, 157, 91, .9);
      color: #fff
    }

    .tag-spicy {
      background: rgba(217, 64, 64, .9);
      color: #fff
    }

    .tag-popular {
      background: rgba(201, 121, 65, .9);
      color: #fff
    }

    .card-body {
      padding: 14px 16px 16px
    }

    .card-name {
      font-size: 1.05rem;
      font-weight: 800;
      line-height: 1.35;
      margin-bottom: 4px
    }

    .card-desc {
      color: var(--fg2);
      font-size: .8rem;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 2.4em
    }

    .card-meta {
      display: flex;
      gap: 12px;
      margin-top: 8px;
      font-size: .72rem;
      color: var(--muted)
    }

    .card-meta i {
      font-size: .85rem
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border)
    }

    .card-price {
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--accent)
    }

    .card-price span {
      font-size: .7rem;
      font-weight: 500;
      color: var(--muted);
      margin-right: 2px
    }

    .lang-en .card-price span {
      margin-right: 0;
      margin-left: 2px
    }

    .admin-edit-btn {
      display: none;
      width: 34px;
      height: 34px;
      border-radius: var(--rr);
      background: var(--accent-l);
      color: var(--accent);
      font-size: 1rem;
      align-items: center;
      justify-content: center;
      transition: all .2s
    }

    body.is-admin .admin-edit-btn {
      display: flex
    }

    .admin-edit-btn:hover {
      background: var(--accent);
      color: #fff
    }

    /* ===== SEARCH ===== */
    .search-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(44, 24, 16, .6);
      backdrop-filter: blur(8px);
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding: 80px 20px 20px;
      overflow-y: auto
    }

    .search-overlay.open {
      display: flex
    }

    .search-box {
      width: 100%;
      max-width: 600px;
      background: var(--card);
      border-radius: var(--r);
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .25);
      animation: fadeUp .3s
    }

    .search-input-wrap {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      gap: 12px;
      border-bottom: 1px solid var(--border)
    }

    .search-input-wrap i {
      font-size: 1.4rem;
      color: var(--muted)
    }

    .search-input-wrap input {
      border: none;
      flex: 1;
      font-size: 1.1rem;
      padding: 0;
      background: transparent
    }

    .search-input-wrap input:focus {
      border: none
    }

    .search-close {
      font-size: 1.3rem;
      color: var(--muted);
      padding: 4px
    }

    .search-results {
      max-height: 50vh;
      overflow-y: auto;
      padding: 8px
    }

    .sr-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 12px;
      border-radius: var(--rs);
      cursor: pointer;
      transition: background .2s
    }

    .sr-item:hover {
      background: var(--bg-alt)
    }

    .sr-item img {
      width: 52px;
      height: 52px;
      border-radius: var(--rr);
      object-fit: cover;
      flex-shrink: 0
    }

    .sr-info {
      flex: 1;
      min-width: 0
    }

    .sr-name {
      font-weight: 700;
      font-size: .9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .sr-cat {
      font-size: .72rem;
      color: var(--muted)
    }

    .sr-price {
      font-weight: 800;
      color: var(--accent);
      font-size: .95rem;
      flex-shrink: 0
    }

    .search-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted)
    }

    /* ===== ADMIN ===== */
    .admin-overlay {
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: var(--bg);
      display: none;
      flex-direction: column;
      overflow-y: auto
    }

    .admin-overlay.open {
      display: flex
    }

    .admin-login {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px
    }

    .admin-login-box {
      width: 100%;
      max-width: 380px;
      background: var(--card);
      border-radius: var(--r);
      padding: 40px 30px;
      box-shadow: var(--sh);
      text-align: center
    }

    .admin-login-box h2 {
      font-size: 1.4rem;
      margin-bottom: 6px
    }

    .admin-login-box p {
      color: var(--muted);
      font-size: .85rem;
      margin-bottom: 24px
    }

    .admin-login-box input {
      margin-bottom: 14px;
      text-align: center;
      font-size: 1rem
    }

    .login-error {
      color: var(--err);
      font-size: .82rem;
      margin-bottom: 10px;
      display: none
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      border-radius: var(--rs);
      font-size: 1rem;
      font-weight: 700;
      transition: background .2s
    }

    .login-btn:hover {
      background: var(--accent-h)
    }

    .admin-dash {
      display: none;
      flex-direction: column;
      min-height: 100%
    }

    .admin-dash.open {
      display: flex
    }

    .admin-top {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(250, 246, 241, .95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap
    }

    .admin-top h2 {
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .admin-top h2 i {
      color: var(--accent)
    }

    .admin-top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap
    }

    .admin-btn {
      padding: 8px 18px;
      border-radius: var(--rr);
      font-size: .82rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all .2s
    }

    .admin-btn.primary {
      background: var(--accent);
      color: #fff
    }

    .admin-btn.primary:hover {
      background: var(--accent-h)
    }

    .admin-btn.outline {
      border: 1.5px solid var(--border);
      color: var(--fg2)
    }

    .admin-btn.outline:hover {
      border-color: var(--err);
      color: var(--err)
    }

    .admin-btn.ghost {
      color: var(--muted)
    }

    .admin-btn.ghost:hover {
      color: var(--fg)
    }

    .admin-filters {
      padding: 12px 20px;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      background: var(--bg-alt)
    }

    .admin-filters::-webkit-scrollbar {
      height: 0
    }

    .admin-filter {
      flex: 0 0 auto;
      padding: 6px 14px;
      border-radius: 16px;
      font-size: .78rem;
      font-weight: 600;
      background: var(--card);
      color: var(--fg2);
      border: 1px solid var(--border);
      transition: all .2s
    }

    .admin-filter.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent)
    }

    .admin-grid {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px
    }

    .admin-card {
      background: var(--card);
      border-radius: var(--rs);
      overflow: hidden;
      box-shadow: var(--sh);
      display: flex;
      gap: 12px;
      padding: 12px;
      align-items: center;
      transition: box-shadow .2s
    }

    .admin-card:hover {
      box-shadow: var(--sh-h)
    }

    .admin-card-img {
      width: 70px;
      height: 70px;
      border-radius: var(--rr);
      object-fit: cover;
      flex-shrink: 0
    }

    .admin-card-info {
      flex: 1;
      min-width: 0
    }

    .admin-card-name {
      font-weight: 700;
      font-size: .9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .admin-card-cat {
      font-size: .7rem;
      color: var(--muted)
    }

    .admin-card-price {
      font-weight: 800;
      color: var(--accent);
      font-size: .9rem
    }

    .admin-card-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0
    }

    .admin-card-actions button {
      width: 34px;
      height: 34px;
      border-radius: var(--rr);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: all .2s
    }

    .ac-edit {
      background: var(--accent-l);
      color: var(--accent)
    }

    .ac-edit:hover {
      background: var(--accent);
      color: #fff
    }

    .ac-del {
      background: #fde8e8;
      color: var(--err)
    }

    .ac-del:hover {
      background: var(--err);
      color: #fff
    }

    .ac-del.confirm {
      background: var(--err);
      color: #fff;
      font-size: .7rem;
      font-weight: 700;
      width: auto;
      padding: 0 10px
    }

    /* ===== EDIT MODAL ===== */
    .edit-overlay {
      position: fixed;
      inset: 0;
      z-index: 3000;
      background: rgba(44, 24, 16, .6);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-y: auto
    }

    .edit-overlay.open {
      display: flex
    }

    .edit-modal {
      width: 100%;
      max-width: 640px;
      background: var(--card);
      border-radius: var(--r);
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .3);
      animation: fadeUp .3s;
      max-height: 90vh;
      display: flex;
      flex-direction: column
    }

    .edit-header {
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .edit-header h3 {
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .edit-header h3 i {
      color: var(--accent)
    }

    .edit-close {
      width: 34px;
      height: 34px;
      border-radius: var(--rr);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      color: var(--muted);
      transition: all .2s
    }

    .edit-close:hover {
      background: var(--bg-alt);
      color: var(--fg)
    }

    .edit-body {
      padding: 20px 22px;
      overflow-y: auto;
      flex: 1
    }

    .edit-img-section {
      text-align: center;
      margin-bottom: 20px
    }

    .edit-img-preview {
      width: 140px;
      height: 140px;
      border-radius: var(--r);
      object-fit: cover;
      margin: 0 auto 10px;
      border: 2px dashed var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: var(--bg-alt)
    }

    .edit-img-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover
    }

    .edit-img-preview i {
      font-size: 2.5rem;
      color: var(--muted)
    }

    .edit-img-actions {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap

      border-radius: var(--rr);
      font-size: .78rem;
      font-weight: 600;
      background: var(--bg-alt);
      color: var(--fg2);
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: 4px

    .edit-img-actions label:hover {
      background: var(--accent-l);
      color: var(--accent)

    .edit-img-actions input {
      display: none
    }

    .edit-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px
    }

    .edit-fields .full {
      grid-column: 1/-1
    }

    .field label {
      display: block;
      font-size: .78rem;
      font-weight: 700;
      color: var(--fg2);
      margin-bottom: 5px
    }

    .field label span {
      color: var(--muted);
      font-weight: 400
    }

    .field-row {
      display: flex;
      gap: 10px
    }

    .field-row .field {
      flex: 1
    }

    .edit-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap
    }

      border-radius: 14px;
      font-size: .75rem;
      font-weight: 600;
      border: 1.5px solid var(--border);
      color: var(--fg2);
      cursor: pointer;
      transition: all .2s;
      user-select: none

    .edit-tag.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent)
    }

    .edit-footer {
      padding: 16px 22px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      justify-content: space-between
    }

    .edit-footer .left {
      display: flex;
      gap: 8px
    }

    .edit-footer .right {
      display: flex;
      gap: 8px
    }

    .save-btn {
      padding: 10px 28px;
      background: var(--accent);
      color: #fff;
      border-radius: var(--rs);
      font-weight: 700;
      font-size: .9rem;
      transition: background .2s
    }

    .save-btn:hover {
      background: var(--accent-h)
    }

    .cancel-btn {
      padding: 10px 20px;
      border: 1.5px solid var(--border);
      color: var(--fg2);
      border-radius: var(--rs);
      font-weight: 600;
      font-size: .9rem;
      transition: all .2s
    }

    .cancel-btn:hover {
      border-color: var(--fg);
      color: var(--fg)
    }

    .del-btn {
      padding: 10px 18px;
      border: 1.5px solid var(--err);
      color: var(--err);
      border-radius: var(--rs);
      font-weight: 600;
      font-size: .9rem;
      transition: all .2s
    }

    .del-btn:hover {
      background: var(--err);
      color: #fff
    }

    /* ===== TOAST ===== */
    .toast-container {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9000;
      display: flex;
      flex-direction: column-reverse;
      gap: 8px;
      pointer-events: none;
      width: 90%;
      max-width: 400px
    }

    .toast {
      padding: 12px 18px;
      border-radius: var(--rs);
      font-size: .85rem;
      font-weight: 600;
      box-shadow: 0 8px 30px rgba(0, 0, 0, .15);

      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .toast.ok {
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #c8e6c9
    }

    .toast.error {
      background: #fde8e8;
      color: #c62828;
      border: 1px solid #f5c6c6
    }

    .toast.info {
      background: var(--accent-l);
      color: var(--accent);
      border: 1px solid #f0d4b8
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* ===== FOOTER ===== */
    footer {
      background: var(--fg);
      color: rgba(255, 255, 255, .6);
      text-align: center;
      padding: 30px 20px;
      font-size: .82rem
    }

    footer .f-brand {
      font-family: var(--font-d);
      font-size: 1.2rem;
      color: var(--accent);
      margin-bottom: 4px
    }

    /* ===== LANGUAGE ===== */
    .lang-en .ar,
    .lang-en .dir-ar {
      display: none !important
    }

    body:not(.lang-en) .en,
    .body:not(.lang-en) .dir-en {
      display: none !important
    }

    body.lang-en {
      direction: ltr
    }

    body.lang-en .header-inner {
      flex-direction: row
    }

    body.lang-en .card-price span {
      margin-left: 2px;
      margin-right: 0
    }

    body.lang-en .bs-star {
      left: 8px;
      right: auto
    }

    body.lang-en .card-tags {
      left: 10px;
      right: auto
    }

    /* ===== RESPONSIVE ===== */
    @media(max-width:640px) {
      .header-inner {
        padding: 10px 14px
      }

      .brand-name {
        font-size: 1.2rem
      }

      .brand-logo {
        width: 36px;
        height: 36px;
        font-size: 1.1rem
      }

      .bs-section {
        padding: 20px 14px 6px
      }

      .bs-section h2 {
        font-size: 1.15rem
      }

      .bs-card {
        flex: 0 0 130px
      }

      .cat-tabs {
        padding: 8px 14px;
        gap: 6px
      }

      .cat-tab {
        padding: 6px 13px;
        font-size: .76rem
      }

      .menu-sections {
        padding: 14px 14px 50px
      }

      .menu-grid {
        grid-template-columns: 1fr;
        gap: 14px
      }

      .section-header h2 {
        font-size: 1.2rem
      }

      .admin-grid {
        grid-template-columns: 1fr;
        padding: 14px
      }

      .edit-fields {
        grid-template-columns: 1fr
      }

      .field-row {
        flex-direction: column;
        gap: 12px
      }

      .edit-modal {
        max-height: 100vh;
        border-radius: 0
      }

      .edit-overlay {
        padding: 0
      }

      .admin-card {
        padding: 10px
      }

      .admin-card-img {
        width: 56px;
        height: 56px
      }
    }

    @media(min-width:641px) and (max-width:1024px) {
      .menu-grid {
        grid-template-columns: repeat(2, 1fr)
      }
    }

    @media(min-width:1025px) {
      .menu-grid {
        grid-template-columns: repeat(3, 1fr)
      }
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted)
    }

    .empty-state i {
      font-size: 3rem;
      margin-bottom: 12px;
      display: block;
      opacity: .4
    }

    .empty-state p {
      font-size: .95rem
    }

    /* ===== REDUCED MOTION ===== */
    @media(prefers-reduced-motion:reduce) {

      *,
      *::before,
      *::after {
        animation-duration: .01ms !important;
        transition-duration: .01ms !important
      }
    }
  </style>
</head>

      async select(table, filters = '') {
        const url = `${SUPABASE_URL}/rest/v1/${table}?order=id.asc${filters}`;
        const res = await fetch(url, {
          headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' }
        });
        if (!res.ok) throw new Error(`Select error: ${res.status}`);
        return res.json();
      },
      async upsert(table, data) {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
          method: 'POST',
          headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' },
          body: JSON.stringify(data)
        });
        if (!res.ok) throw new Error(`Upsert error: ${res.status}`);
        return true;
      },
      async update(table, id, data) {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${encodeURIComponent(id)}`, {
          method: 'PATCH',
          headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
          body: JSON.stringify(data)
        });

        return true;
      },

          method: 'DELETE',
          headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }

    function fromDB(r) {
      return { id: r.id, cat: r.cat, nameEn: r.name_en || '', nameAr: r.name_ar || '', descEn: r.desc_en || '', descAr: r.desc_ar || '', price: Number(r.price) || 0, calories: r.calories ? Number(r.calories) : null, weight: r.weight ? Number(r.weight) : null, img: r.img || '', tags: Array.isArray(r.tags) ? r.tags : [] };
    }
    function toDB(item) {
      return { id: item.id, cat: item.cat, name_en: item.nameEn || '', name_ar: item.nameAr || '', desc_en: item.descEn || '', desc_ar: item.descAr || '', price: Number(item.price) || 0, calories: item.calories ? Number(item.calories) : null, weight: item.weight ? Number(item.weight) : null, img: item.img || '', tags: Array.isArray(item.tags) ? item.tags : [], updated_at: new Date().toISOString() };
    }

    /* ============================================================
      SYNC STATUS
    ============================================================ */
    function setSyncStatus(s) {
      const el = document.getElementById('syncStatus');
      if (!el) return;
      const dot = el.querySelector('.sync-dot');
      const spans = el.querySelectorAll('span');
      el.className = 'sync-indicator ' + s;
      if (dot) { s === 'syncing' ? dot.classList.add('pulse') : dot.classList.remove('pulse'); }
      const m = { synced: ['متزامن', 'Synced'], syncing: ['جاري التحديث...', 'Syncing...'], error: ['غير متصل', 'Offline'] };
      if (spans[0]) spans[0].textContent = m[s][0];
      if (spans[1]) spans[1].textContent = m[s][1];
    }

    /* ============================================================
      DATA LOADING
    ============================================================ */
    let menuData = [];
    let dataVersion = '';

    async function loadFromSupabase() {
      try {
        setSyncStatus('syncing');
        const rows = await sb.select('menu_items');
        if (rows && rows.length > 0) {
          menuData = rows.map(fromDB);
          dataVersion = JSON.stringify(rows);
          setSyncStatus('synced');
          return true;
        } else {
          await seedDatabase();
          return true;
        }
      } catch (err) {
        console.error('Load failed:', err);
        setSyncStatus('error');
        menuData = JSON.parse(JSON.stringify(DEFAULT_MENU_DATA));
        showToast('تعذر الاتصال بقاعدة البيانات — يتم استخدام البيانات المحلية', 'error');
        return false;
      }
    }

    async function seedDatabase() {
      try {
        setSyncStatus('syncing');
        const dbData = DEFAULT_MENU_DATA.map(toDB);
        await sb.upsert('menu_items', dbData);
        menuData = JSON.parse(JSON.stringify(DEFAULT_MENU_DATA));
        dataVersion = JSON.stringify(dbData);
        setSyncStatus('synced');
        showToast('تم رفع البيانات الافتراضية بنجاح', 'ok');
      } catch (err) {
        console.error('Seed failed:', err);
        setSyncStatus('error');
        menuData = JSON.parse(JSON.stringify(DEFAULT_MENU_DATA));
      }
    }

    async function saveItemToSupabase(item) {
      try {
        setSyncStatus('syncing');
        await sb.update('menu_items', item.id, toDB(item));
        setSyncStatus('synced');
        return true;
      } catch (err) {
        console.error('Save failed:', err);
        setSyncStatus('error');
        showToast('فشل الحفظ — تحقق من الاتصال', 'error');
        return false;
      }
    }

    async function deleteItemFromSupabase(id) {
      try {
        setSyncStatus('syncing');
        await sb.remove('menu_items', id);
        setSyncStatus('synced');
        return true;
      } catch (err) {
        console.error('Delete failed:', err);
        setSyncStatus('error');
        showToast('فشل الحذف', 'error');
        return false;
      }
    }

    ============================================================ */
    function startPolling() {

        if (document.getElementById('adminPanel').classList.contains('open')) return;
        try {
          const rows = await sb.select('menu_items');
          const nv = JSON.stringify(rows);
          if (nv !== dataVersion && rows.length > 0) {

            menuData = rows.map(fromDB);
            renderMenuSections();
            renderCategoryTabs();
            renderBestsellers();
            showToast('تم تحديث القائمة', 'info');
          }
        } catch (e) { /* صامت */ }
      }, 15000);
    }

    document.addEventListener('DOMContentLoaded', async () => {
      applyLang(currentLang);
      await loadFromSupabase();
      renderBestsellers();
      renderCategoryTabs();
      renderMenuSections();
      showCategory(activeCategory);
      setupScroll();
      startPolling();

      // إخفاء شاشة التحميل
      const ls = document.getElementById('loading-screen');
      if (ls) { ls.classList.add('fade-out'); setTimeout(() => ls.remove(), 600); }

      // اختصارات لوحة المفاتيح
      document.addEventListener('keydown', e => {

      if (new URLSearchParams(window.location.search).get('admin') === 'true') openAdmin();

    /* ============================================================
      LANGUAGE
    ============================================================ */
    function setLang(lang) {
      currentLang = lang;
      localStorage.setItem('sasa_lang', lang);
      applyLang(lang);
    }
    function applyLang(lang) {
      if (lang === 'en') {
        document.documentElement.setAttribute('lang', 'en');
        document.documentElement.setAttribute('dir', 'ltr');
        document.body.setAttribute('dir', 'ltr');
        document.body.classList.add('lang-en');
      } else {
        document.documentElement.setAttribute('lang', 'ar');
        document.documentElement.setAttribute('dir', 'rtl');
        document.body.setAttribute('dir', 'rtl');
        document.body.classList.remove('lang-en');
      }
      document.querySelectorAll('.lang-btn').forEach(btn => {
        const oc = btn.getAttribute('onclick') || '';
        btn.classList.toggle('active', (lang === 'en' && oc.includes("'en'")) || (lang === 'ar' && oc.includes("'ar'")));
      });
    }

    /* ============================================================
      RENDER — BESTSELLERS
    ============================================================ */
    function renderBestsellers() {
      const el = document.getElementById('bsScroll');
      if (!el) return;
      el.innerHTML = bestsellers.map(b => `

      <div class="bs-img-wrap">
        <img src="${b.img}" alt="${b.nameEn}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1509440159596-0249088772ff?w=200&h=200&fit=crop'">

      </div>
    </div>`).join('');

    /* ============================================================
      RENDER — CATEGORY TABS
    ============================================================ */
    function buildCategoryCounts() {
      const c = {};
      menuData.forEach(i => { c[i.cat] = (c[i.cat] || 0) + 1; });
      return c;
    }

    function renderCategoryTabs() {
      const counts = buildCategoryCounts();
      const el = document.getElementById('catTabs');
      if (!el) return;
      el.innerHTML = categories.map(c => {
        const cnt = counts[c.id] || 0;
        if (cnt === 0) return '';
        const active = activeCategory === c.id ? ' active' : '';
        return `<button class="cat-tab${active}" onclick="showCategory('${c.id}')"><i class="ti ${c.icon}"></i> <span class="ar">${c.nameAr}</span><span class="en">${c.nameEn}</span> <span class="cat-count">${cnt}</span></button>`;
      }).join('');
    }

    /* ============================================================
      RENDER — MENU SECTIONS
    ============================================================ */
    function renderMenuSections() {
      const container = document.getElementById('menuSections');
      if (!container) return;
      container.innerHTML = categories.map(cat => {
        const items = menuData.filter(i => i.cat === cat.id);
        if (items.length === 0) return '';
        const cards = items.map(item => buildCard(item)).join('');
        return `<div class="menu-section${activeCategory === cat.id ? ' active' : ''}" data-cat="${cat.id}">
      <div class="section-header">
        <h2><i class="ti ${cat.icon}"></i> <span class="ar">${cat.nameAr}</span><span class="en">${cat.nameEn}</span></h2>
        <p><span class="ar">${cat.introAr || ''}</span><span class="en">${cat.introEn || ''}</span></p>
      </div>
      <div class="menu-grid">${cards}</div>
    </div>`;
      }).join('');
    }

    function buildCard(item) {
      const tagsHtml = (item.tags || []).filter(t => allTags.includes(t)).map(t => {
        const cls = t === 'veg' ? 'tag-veg' : t === 'spicy' ? 'tag-spicy' : 'tag-popular';
        const lbl = tagLabels[t] || {};
        return `<span class="tag ${cls}"><span class="ar">${lbl.ar || t}</span><span class="en">${lbl.en || t}</span></span>`;
      }).join('');

      let metaHtml = '';
      if (item.calories) metaHtml += `<span><i class="ti ti-flame"></i> ${item.calories} cal</span>`;
      if (item.weight) metaHtml += `<span><i class="ti ti-weight"></i> ${item.weight}g</span>`;

      return `<div class="menu-card" data-id="${item.id}">
    <div class="card-img">
      <img src="${item.img}" alt="${item.nameEn}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1509440159596-0249088772ff?w=400&h=300&fit=crop'">
      <div class="card-tags">${tagsHtml}</div>
    </div>
    <div class="card-body">
      <div class="card-name"><span class="ar">${item.nameAr}</span><span class="en">${item.nameEn}</span></div>
      <div class="card-desc"><span class="ar">${item.descAr || ''}</span><span class="en">${item.descEn || ''}</span></div>
      ${metaHtml ? `<div class="card-meta">${metaHtml}</div>` : ''}
      <div class="card-footer">
        <div class="card-price">${item.price} <span>SAR</span></div>
        <button class="admin-edit-btn" onclick="openEditModal('${item.id}')" title="تعديل"><i class="ti ti-edit"></i></button>
      </div>
    </div>
  </div>`;
    }

    /* ============================================================
      CATEGORY SWITCHING
    =========================================================== */
    function showCategory(catId) {
      activeCategory = catId;
      // تحديث التبويبات
      document.querySelectorAll('.cat-tab').forEach(tab => {
        tab.classList.toggle('active', tab.getAttribute('onclick') && tab.getAttribute('onclick').includes(`'${catId}'`));
      });
      // تحديث الأقسام
      document.querySelectorAll('.menu-section').forEach(sec => {
        sec.classList.toggle('active', sec.dataset.cat === catId);
      });
      // سكرول لقسم المنيو
      const sec = document.querySelector(`.menu-section[data-cat="${catId}"]`);
      if (sec) {
        const tabsWrap = document.querySelector('.cat-tabs-wrap');
        const offset = tabsWrap ? tabsWrap.offsetHeight + 70 : 70;
        const top = sec.getBoundingClientRect().top + window.scrollY - offset;
        window.scrollTo({ top, behavior: 'smooth' });
      }
    }

    /* ============================================================
      FIND ITEM (من الأكثر مبيعاً)
    ============================================================ */
    function findItem(nameEn) {
      const item = menuData.find(i => i.nameEn === nameEn);
      if (!item) return;
      // انتقل لقسم الصنف
      showCategory(item.cat);
      // بعد الانتقال، سكرول للكارت
      setTimeout(() => {
        const card = document.querySelector(`.menu-card[data-id="${item.id}"]`);
        if (card) {
          card.scrollIntoView({ behavior: 'smooth', block: 'center' });
          card.style.boxShadow = '0 0 0 3px var(--accent), var(--sh-h)';
          setTimeout(() => { card.style.boxShadow = ''; }, 2000);
        }
      }, 500);
    }

    /* ============================================================
      SCROLL — هيدر لاصق
    ============================================================ */
    function setupScroll() {
      const header = document.getElementById('mainHeader');
      let lastY = 0;
      window.addEventListener('scroll', () => {
        header.classList.toggle('scrolled', window.scrollY > 10);
        lastY = window.scrollY;
      }, { passive: true });
    }

    /* ============================================================
      SEARCH
    ============================================================ */
    function openSearch() {
      const ov = document.getElementById('searchOverlay');
      ov.classList.add('open');
      const inp = document.getElementById('searchInput');
      inp.value = '';
      inp.focus();
      document.getElementById('searchResults').innerHTML = '';
    }
    function closeSearch() {
      document.getElementById('searchOverlay').classList.remove('open');
    }
    function performSearch(q) {
      const res = document.getElementById('searchResults');
      if (!q || q.length < 2) { res.innerHTML = ''; return; }
      const ql = q.toLowerCase();
      const found = menuData.filter(i =>
        (i.nameAr && i.nameAr.includes(q)) ||
        (i.nameEn && i.nameEn.toLowerCase().includes(ql)) ||
        (i.descAr && i.descAr.includes(q)) ||
        (i.descEn && i.descEn.toLowerCase().includes(ql))
      ).slice(0, 20);

      if (found.length === 0) {
        res.innerHTML = `<div class="search-empty"><i class="ti ti-mood-sad" style="font-size:2rem;display:block;margin-bottom:8px"></i><span class="ar">لا توجد نتائج</span><span class="en">No results found</span></div>`;
        return;
      }
      res.innerHTML = found.map(i => {
        const cat = categories.find(c => c.id === i.cat);
        const catName = cat ? (currentLang === 'ar' ? cat.nameAr : cat.nameEn) : '';
        return `<div class="sr-item" onclick="closeSearch();findItemById('${i.id}')">
      <img src="${i.img}" alt="" onerror="this.src='https://images.unsplash.com/photo-1509440159596-0249088772ff?w=100&h=100&fit=crop'">
      <div class="sr-info">
        <div class="sr-name"><span class="ar">${i.nameAr}</span><span class="en">${i.nameEn}</span></div>
        <div class="sr-cat">${catName}</div>
      </div>
      <div class="sr-price">${i.price} <small>SAR</small></div>
    </div>`;
      }).join('');
    }
    function findItemById(id) {
      const item = menuData.find(i => i.id === id);
      if (!item) return;
      showCategory(item.cat);
      setTimeout(() => {
        const card = document.querySelector(`.menu-card[data-id="${id}"]`);
        if (card) {
          card.scrollIntoView({ behavior: 'smooth', block: 'center' });
          card.style.boxShadow = '0 0 0 3px var(--accent), var(--sh-h)';
          setTimeout(() => { card.style.boxShadow = ''; }, 2000);
        }
      }, 500);
    }

      document.getElementById('adminPanel').classList.add('open');

      document.getElementById('adminPanel').classList.remove('open');

      renderMenuSections();
      renderCategoryTabs();

      showCategory(activeCategory);

    function adminLogin() {
      const pass = document.getElementById('adminPass').value;
      if (pass === ADMIN_PASSWORD) {
        isAdmin = true;
        document.body.classList.add('is-admin');
        document.getElementById('adminLogin').style.display = 'none';
        document.getElementById('adminDash').classList.add('open');

        renderAdminFilters();
        renderAdminList();
      } else {
        document.getElementById('loginError').style.display = 'block';

      isAdmin = false;
      document.body.classList.remove('is-admin');
      document.getElementById('adminLogin').style.display = '';
      document.getElementById('adminDash').classList.remove('open');
      document.getElementById('adminPass').value = '';

    /* فلتر الأقسام في الأدمن */
    function renderAdminFilters() {
      const el = document.getElementById('adminFilters');
      const counts = buildCategoryCounts();

      categories.forEach(c => {
        const cnt = counts[c.id] || 0;
        if (cnt === 0) return;
        html += `<button class="admin-filter${adminFilterCat === c.id ? ' active' : ''}" onclick="setAdminFilter('${c.id}')"><span class="ar">${c.nameAr}</span><span class="en">${c.nameEn}</span> (${cnt})</button>`;
      });
      el.innerHTML = html;
    }

      adminFilterCat = cat;
      renderAdminFilters();
      renderAdminList();
    }

      <div class="admin-card-actions">
        <button class="ac-edit" onclick="openEditModal('${i.id}')" title="تعديل"><i class="ti ti-edit"></i></button>
        <button class="ac-del" id="del-${i.id}" onclick="confirmDelete('${i.id}')" title="حذف"><i class="ti ti-trash"></i></button>
      </div>
    </div>`;
      }).join('');
    }

    /* تأكيد الحذف — يضغط مرة يتغير الزر، يضغط مرة ثانية يحذف */
    function confirmDelete(id) {
      const btn = document.getElementById('del-' + id);
      if (!btn) return;
      if (btn.classList.contains('confirm')) {
        // حذف فعلي
        deleteItemById(id);
      } else {
        btn.classList.add('confirm');
        btn.innerHTML = '<span class="ar">تأكيد؟</span><span class="en">Sure?</span>';
        btn.title = 'اضغط مرة أخرى للحذف';
        setTimeout(() => {
          if (btn) {
            btn.classList.remove('confirm');
            btn.innerHTML = '<i class="ti ti-trash"></i>';
            btn.title = 'حذف';
          }
        }, 3000);
      }
    }

    async function deleteItemById(id) {
      const idx = menuData.findIndex(i => i.id === id);
      if (idx === -1) return;
      const name = menuData[idx].nameAr;
      // حذف محلي أولاً
      menuData.splice(idx, 1);
      // حذف من سابابيز
      await deleteItemFromSupabase(id);
      // إعادة رندر
      renderAdminList();
      renderAdminFilters();
      showToast(`تم حذف: ${name}`, 'ok');
    }

    /* استعادة البيانات الافتراضية */
    async function resetToDefault() {
      menuData = JSON.parse(JSON.stringify(DEFAULT_MENU_DATA));
      await seedDatabase();
      renderAdminFilters();
      renderAdminList();
      showToast('تم استعادة البيانات الافتراضية', 'ok');
    }

    /* ============================================================
      EDIT MODAL
    ============================================================ */
    function openEditModal(id) {
      editingItemId = id;
      pendingImg = null;
      const modal = document.getElementById('editModal');
      const titleAr = document.getElementById('editTitle');
      const titleEn = document.getElementById('editTitleEn');
      const delBtn = document.getElementById('editDelBtn');

      // ملء قائمة الأقسام
      const catSelect = document.getElementById('editCat');
      catSelect.innerHTML = categories.map(c => `<option value="${c.id}">${c.nameAr} — ${c.nameEn}</option>`).join('');

      // ملء التاجات
      const tagsEl = document.getElementById('editTags');
      tagsEl.innerHTML = allTags.map(t => {
        const lbl = tagLabels[t];
        return `<button type="button" class="edit-tag" data-tag="${t}" onclick="toggleEditTag(this)"><span class="ar">${lbl.ar}</span><span class="en">${lbl.en}</span></button>`;
      }).join('');

      if (id) {
        // تعديل صنف موجود
        const item = menuData.find(i => i.id === id);
        if (!item) return;
        titleAr.textContent = 'تعديل الصنف';
        titleEn.textContent = 'Edit Item';
        delBtn.style.display = '';
        document.getElementById('editNameAr').value = item.nameAr || '';
        document.getElementById('editNameEn').value = item.nameEn || '';
        document.getElementById('editDescAr').value = item.descAr || '';
        document.getElementById('editDescEn').value = item.descEn || '';
        document.getElementById('editPrice').value = item.price || 0;
        document.getElementById('editCal').value = item.calories || '';
        document.getElementById('editWeight').value = item.weight || '';
        document.getElementById('editCat').value = item.cat;
        document.getElementById('editId').value = item.id;
        document.getElementById('editImgUrl').value = item.img || '';
        // معاينة الصورة
        setImgPreview(item.img || '');
        // التاجات
        (item.tags || []).forEach(t => {
          const tagBtn = tagsEl.querySelector(`[data-tag="${t}"]`);
          if (tagBtn) tagBtn.classList.add('active');
        });
      } else {
        // إضافة صنف جديد
        titleAr.textContent = 'إضافة صنف جديد';
        titleEn.textContent = 'Add New Item';
        delBtn.style.display = 'none';
        document.getElementById('editNameAr').value = '';
        document.getElementById('editNameEn').value = '';
        document.getElementById('editDescAr').value = '';
        document.getElementById('editDescEn').value = '';
        document.getElementById('editPrice').value = '';
        document.getElementById('editCal').value = '';
        document.getElementById('editWeight').value = '';
        document.getElementById('editCat').value = activeCategory;
        // توليد ID جديد
        const prefix = activeCategory.substring(0, 2);
        const num = String(Math.floor(Math.random() * 900) + 100);
        document.getElementById('editId').value = prefix + num;
        document.getElementById('editImgUrl').value = '';
        setImgPreview('');
      }

      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeEditModal() {
      document.getElementById('editModal').classList.remove('open');
      if (!document.getElementById('adminPanel').classList.contains('open')) {
        document.body.style.overflow = '';
      }
      editingItemId = null;
      pendingImg = null;
    }

    function toggleEditTag(btn) {
      btn.classList.toggle('active');
    }

    function setImgPreview(src) {
      const el = document.getElementById('editImgPreview');
      if (src && src.startsWith('http')) {
        el.innerHTML = `<img src="${src}" alt="" onerror="this.parentElement.innerHTML='<i class=\\'ti ti-photo-off\\' style=\\'font-size:2rem;color:var(--muted)\\'></i>'">`;
      } else if (src && src.startsWith('data:')) {
        el.innerHTML = `<img src="${src}" alt="">`;
      } else {
        el.innerHTML = '<i class="ti ti-photo" style="font-size:2.5rem;color:var(--muted)"></i>';
      }
    }

    function applyImageUrl(url) {
      pendingImg = null;
      setImgPreview(url);
    }

    /* رفع صورة مع ضغط */
    async function handleImageUpload(file) {
      if (!file) return;
      if (!file.type.startsWith('image/')) {
        showToast('يرجى اختيار ملف صورة', 'error');
        return;
      }
      try {
        const dataUrl = await compressImage(file, 500, 0.7);
        // تحقق من الحجم (نصيح ألا يتعدى 500KB)
        const sizeKB = Math.round((dataUrl.length * 3) / 4 / 1024);
        if (sizeKB > 500) {
          showToast(`الصورة كبيرة جداً (${sizeKB}KB) — يُنصح برابط صورة بدلاً من ذلك`, 'error');
        }
        pendingImg = dataUrl;
        document.getElementById('editImgUrl').value = '';
        setImgPreview(dataUrl);
      } catch (e) {
        showToast('فشل في معالجة الصورة', 'error');
      }
    }

    function compressImage(file, maxDim, quality) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let w = img.width, h = img.height;
            if (w > maxDim || h > maxDim) {
              const ratio = Math.min(maxDim / w, maxDim / h);
              w = Math.round(w * ratio);
              h = Math.round(h * ratio);
            }
            canvas.width = Math.max(1, w);
            canvas.height = Math.max(1, h);
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.onerror = () => reject(new Error('Image load failed'));
          img.src = e.target.result;
        };
        reader.onerror = () => reject(new Error('File read failed'));
        reader.readAsDataURL(file);
      });
    }

    /* حفظ التعديل */
    async function saveEdit() {
      const nameAr = document.getElementById('editNameAr').value.trim();
      const nameEn = document.getElementById('editNameEn').value.trim();
      const descAr = document.getElementById('editDescAr').value.trim();
      const descEn = document.getElementById('editDescEn').value.trim();
      const price = parseFloat(document.getElementById('editPrice').value) || 0;
      const cal = document.getElementById('editCal').value ? parseInt(document.getElementById('editCal').value) : null;
      const weight = document.getElementById('editWeight').value ? parseInt(document.getElementById('editWeight').value) : null;
      const cat = document.getElementById('editCat').value;
      const id = document.getElementById('editId').value.trim();
      const imgUrl = document.getElementById('editImgUrl').value.trim();

      // التحقق
      if (!nameAr && !nameEn) {
        showToast('يرجى إدخال اسم الصنف', 'error');
        return;
      }
      if (!id) {
        showToast('يرجى إدخال معرف الصنف', 'error');
        return;
      }
      // التحقق من عدم تكرار الـ ID (إلا إذا كان نفس الصنف)
      if (!editingItemId || editingItemId !== id) {
        if (menuData.find(i => i.id === id)) {
          showToast('معرف الصنف مستخدم مسبقاً — اختر معرفاً مختلفاً', 'error');
          return;
        }
      }

      // جمع التاجات
      const tags = [];
      document.querySelectorAll('#editTags .edit-tag.active').forEach(btn => {
        tags.push(btn.dataset.tag);
      });

      // تحديد الصورة
      const img = pendingImg || imgUrl || '';

      // بناء كائن الصنف
      const item = { id, cat, nameEn, nameAr, descEn, descAr, price, calories: cal, weight, img, tags };

      if (editingItemId && editingItemId !== id) {
        // تغيير الـ ID = حذف القديم وإضافة جديد
        await deleteItemFromSupabase(editingItemId);
        const idx = menuData.findIndex(i => i.id === editingItemId);
        if (idx !== -1) menuData.splice(idx, 1);
        menuData.push(item);
        await sb.upsert('menu_items', [toDB(item)]);
      } else if (editingItemId) {
        // تحديث صنف موجود
        const idx = menuData.findIndex(i => i.id === editingItemId);
        if (idx !== -1) menuData[idx] = item;
        await saveItemToSupabase(item);
      } else {
        // إضافة صنف جديد
        menuData.push(item);
        await sb.upsert('menu_items', [toDB(item)]);
      }

      // إعادة رندر
      renderAdminList();
      renderAdminFilters();
      closeEditModal();
      showToast(editingItemId ? 'تم تحديث الصنف بنجاح' : 'تم إضافة الصنف بنجاح', 'ok');
    }

    /* حذف من نافذة التعديل */
    async function deleteCurrentItem() {
      if (!editingItemId) return;
      const item = menuData.find(i => i.id === editingItemId);
      const name = item ? item.nameAr : editingItemId;
      const idx = menuData.findIndex(i => i.id === editingItemId);
      if (idx !== -1) menuData.splice(idx, 1);
      await deleteItemFromSupabase(editingItemId);
      renderAdminList();
      renderAdminFilters();
      closeEditModal();
      showToast(`تم حذف: ${name}`, 'ok');
    }

    /* ============================================================
      TOAST
    ============================================================ */
    function showToast(msg, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = 'toast ' + type;
      const icon = type === 'ok' ? 'ti-check' : type === 'error' ? 'ti-alert-circle' : 'ti-info-circle';
      toast.innerHTML = `<i class="ti ${icon}"></i> ${msg}`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(20px)';
        toast.style.transition = 'all .3s';
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }
  </script>
